<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCERT Class 7 English Grammar Annual Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
        }
        .ncert-card {
            background: #ffffff;
            border-top: 8px solid #1e40af;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .option-btn {
            transition: all 0.2s ease;
            border: 2px solid #f1f5f9;
        }
        .correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #14532d !important;
        }
        .wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #7f1d1d !important;
        }
    </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">

    <div id="app" class="w-full max-w-2xl">
        <!-- Start Screen -->
        <div id="start-screen" class="ncert-card rounded-3xl p-10 text-center">
            <div class="mb-6 inline-block p-5 bg-blue-50 rounded-2xl text-blue-700">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-slate-900 mb-2">English Grammar Mastery</h1>
            <p class="text-slate-500 font-medium mb-8">Aligned with NCERT Class 7 Curriculum</p>
            
            <button onclick="startQuiz()" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95 text-lg">
                Start Final Revision
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden ncert-card rounded-3xl p-8">
            <div class="flex justify-between items-center mb-6">
                <span id="question-count" class="text-sm font-bold text-blue-700 bg-blue-50 px-3 py-1 rounded-full"></span>
                <div class="w-32 h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-blue-600 transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <h2 id="question-text" class="text-xl md:text-2xl font-bold text-slate-800 mb-8 min-h-[70px]"></h2>

            <div id="options-container" class="space-y-3"></div>

            <button id="next-btn" onclick="nextQuestion()" class="hidden mt-8 w-full bg-slate-800 hover:bg-black text-white font-bold py-4 rounded-xl shadow-md transition-all">
                Next Question →
            </button>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden ncert-card rounded-3xl p-10 text-center">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Annual Exam Report</h2>
            <div class="relative inline-block mb-8">
                <svg class="w-32 h-32">
                    <circle cx="64" cy="64" r="58" stroke="#f1f5f9" stroke-width="12" fill="none" />
                    <circle id="score-circle" cx="64" cy="64" r="58" stroke="#1d4ed8" stroke-width="12" fill="none" stroke-dasharray="364.4" stroke-dashoffset="364.4" style="transition: stroke-dashoffset 1s ease-out" />
                </svg>
                <div class="absolute inset-0 flex items-center justify-center">
                    <span id="final-score" class="text-3xl font-bold text-blue-700">0</span>
                </div>
            </div>
            <p id="result-msg" class="text-slate-600 mb-8 font-medium"></p>
            <button onclick="location.reload()" class="w-full bg-blue-700 text-white font-bold py-4 rounded-xl">Restart Practice</button>
        </div>
    </div>

    <script>
        const ncertData = [
            { q: "Fill in with correct Modal: We ___ respect our elders.", a: ["can", "might", "must", "could"], c: "must" },
            { q: "Change to Passive: 'The king helped the hermit.'", a: ["The hermit is helped by the king.", "The hermit was helped by the king.", "The hermit helps the king.", "The king was helped by the hermit."], c: "The hermit was helped by the king." },
            { q: "Choose correct Tense: I ___ my work just now.", a: ["finish", "have finished", "finished", "was finishing"], c: "have finished" },
            { q: "Identify the Adverb: 'The cricket sang happily all summer.'", a: ["Sang", "Cricket", "Happily", "Summer"], c: "Happily" },
            { q: "Choose correct Article: Copper is ___ useful metal.", a: ["a", "an", "the", "no article"], c: "a" },
            { q: "Which of these is an Imperative sentence?", a: ["What a beautiful flower!", "Where are you going?", "Please shut the door.", "He is a good boy."], c: "Please shut the door." },
            { q: "Choose the correct Conjunction: He is poor ___ he is honest.", a: ["and", "but", "because", "so"], c: "but" },
            { q: "Select correct Pronoun: 'The dog wagged ___ tail.'", a: ["his", "its", "it's", "their"], c: "its" },
            { q: "Identify the Abstract Noun: 'Kindness is a great virtue.'", a: ["Great", "Virtue", "Kindness", "Both Kindness and Virtue"], c: "Both Kindness and Virtue" },
            { q: "Choose the correct degree: Prevention is ___ than cure.", a: ["good", "better", "best", "more good"], c: "better" },
            { q: "Find the odd one (Part of Speech):", a: ["Slowly", "Beautifully", "Fast", "Table"], c: "Table" },
            { q: "Change into Indirect Speech: Ram says, 'I am busy.'", a: ["Ram said that he was busy.", "Ram says that he is busy.", "Ram says that I am busy.", "Ram told that he is busy."], c: "Ram says that he is busy." },
            { q: "Complete the phrase: 'A ___ of sheep.'", a: ["herd", "flock", "pack", "bunch"], c: "flock" },
            { q: "Past Tense of 'Teach' is:", a: ["Teached", "Taught", "Tought", "Teaching"], c: "Taught" },
            { q: "Choose the correct preposition: He has been ill ___ Monday.", a: ["for", "since", "from", "by"], c: "since" },
            { q: "Opposite of 'Knowledge' is:", a: ["Wisdom", "Ignorance", "Education", "Smart"], c: "Ignorance" },
            { q: "Correct spelling:", a: ["Grammer", "Grammar", "Gramar", "Gramerr"], c: "Grammar" },
            { q: "Modal for possibility: It ___ rain today.", a: ["must", "may", "should", "ought"], c: "may" },
            { q: "Which is a Transitive Verb?", a: ["He sleeps.", "The sun shines.", "He wrote a letter.", "Birds fly."], c: "He wrote a letter." },
            { q: "Plural of 'Leaf' is:", a: ["Leafs", "Leaves", "Leafes", "Leavs"], c: "Leaves" },
            { q: "Identify the tense: 'She had gone before I arrived.'", a: ["Past Continuous", "Past Perfect", "Simple Past", "Present Perfect"], c: "Past Perfect" },
            { q: "Antonym of 'Flexible':", a: ["Soft", "Rigid", "Easy", "Bending"], c: "Rigid" },
            { q: "Choose correct form: Five kilometers ___ a long distance.", a: ["are", "is", "am", "were"], c: "is" },
            { q: "Identify the Interjection: '___! We won the match.'", a: ["Alas", "Hurrah", "Hello", "Oh"], c: "Hurrah" },
            { q: "What is 'Honey' in 'The honey is sweet'?", a: ["Common Noun", "Material Noun", "Collective Noun", "Proper Noun"], c: "Material Noun" },
            { q: "Choose correct article: He is ___ M.A. in English.", a: ["a", "an", "the", "no article"], c: "an" },
            { q: "Sentence type: 'How cold the night is!'", a: ["Declarative", "Interrogative", "Exclamatory", "Imperative"], c: "Exclamatory" },
            { q: "Correct preposition: She is fond ___ music.", a: ["of", "off", "for", "with"], c: "of" },
            { q: "Plural of 'Furniture' is:", a: ["Furnitures", "Furniture", "Furnituries", "Pieces of furniture"], c: "Furniture" },
            { q: "Identify the Adjective: 'The desert is dry and sandy.'", a: ["Desert", "Dry", "Sandy", "Both Dry and Sandy"], c: "Both Dry and Sandy" },
            { q: "Choose the correct Modal: You ___ not smoke.", a: ["can", "may", "must", "might"], c: "must" },
            { q: "Change to Active: 'A song was sung by her.'", a: ["She sings a song.", "She sang a song.", "She is singing a song.", "She had sung a song."], c: "She sang a song." },
            { q: "Meaning of 'Invincible':", a: ["Weak", "That cannot be defeated", "Visible", "Poor"], c: "That cannot be defeated" },
            { q: "Find the silent letter in 'Honest':", a: ["H", "O", "N", "E"], c: "H" },
            { q: "Past Participle of 'Fly' is:", a: ["Flew", "Flown", "Flying", "Flies"], c: "Flown" },
            { q: "Choose correct article: I read ___ Bible every day.", a: ["a", "an", "the", "no article"], c: "the" },
            { q: "Synonym of 'Fragile':", a: ["Strong", "Delicate", "Heavy", "New"], c: "Delicate" },
            { q: "Identify the pronoun: 'They themselves told me.'", a: ["Personal", "Emphatic", "Relative", "Possessive"], c: "Emphatic" },
            { q: "Correct conjunction: Work hard ___ you will fail.", a: ["and", "but", "or", "because"], c: "or" },
            { q: "The young one of a 'Lion' is:", a: ["Puppy", "Cub", "Foal", "Kid"], c: "Cub" },
            { q: "Identify the tense: 'I am playing.'", a: ["Simple Present", "Present Continuous", "Present Perfect", "Present Perfect Continuous"], c: "Present Continuous" },
            { q: "Comparative of 'Little':", a: ["Littler", "Less", "Least", "More little"], c: "Less" },
            { q: "Choose correct verb: The news ___ true.", a: ["is", "are", "were", "been"], c: "is" },
            { q: "What is 'Swimming' in 'Swimming is a good exercise'?", a: ["Verb", "Noun (Gerund)", "Adjective", "Adverb"], c: "Noun (Gerund)" },
            { q: "Identify the suffix in 'Carefully':", a: ["Care", "Full", "Ly", "Fully"], c: "Ly" },
            { q: "Preposition: The cat is hiding ___ the bed.", a: ["in", "on", "under", "between"], c: "under" },
            { q: "Antonym of 'Major':", a: ["Big", "Minor", "Great", "Main"], c: "Minor" },
            { q: "Direct Speech: He told me that he was ill.", a: ["He said, 'I am ill.'", "He says, 'I am ill.'", "He said, 'He was ill.'", "He says, 'He is ill.'"], c: "He said, 'I am ill.'" },
            { q: "Identify the gender of 'Teacher':", a: ["Masculine", "Feminine", "Common", "Neuter"], c: "Common" },
            { q: "Select correct spelling:", a: ["Commitee", "Committee", "Comittee", "Commitie"], c: "Committee" }
        ];

        let quizQuestions = [];
        let currentIdx = 0;
        let score = 0;
        let answered = false;

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function startQuiz() {
            quizQuestions = shuffle([...ncertData]);
            currentIdx = 0;
            score = 0;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            answered = false;
            const q = quizQuestions[currentIdx];
            document.getElementById('question-count').innerText = `Question ${currentIdx + 1} / 50`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / 50) * 100}%`;

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            const shuffledOpts = shuffle([...q.a]);
            shuffledOpts.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-4 rounded-xl font-medium text-slate-700 bg-white hover:bg-blue-50 flex items-center shadow-sm';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            if (answered) return;
            answered = true;

            const correct = quizQuestions[currentIdx].c;
            const allBtns = document.querySelectorAll('.option-btn');

            if (selected === correct) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                allBtns.forEach(b => { if (b.innerText === correct) b.classList.add('correct'); });
            }

            document.getElementById('next-btn').classList.remove('hidden');
            if (currentIdx === 49) document.getElementById('next-btn').innerText = "Finish Exam";
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < 50) showQuestion();
            else showResult();
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score}/50`;
            
            const offset = 364.4 - (score / 50) * 364.4;
            document.getElementById('score-circle').style.strokeDashoffset = offset;

            let msg = "";
            if (score >= 45) msg = "Outstanding! You are ready for the Annual Exam.";
            else if (score >= 35) msg = "Great performance! Focus on your weak areas.";
            else msg = "Good effort. Review NCERT grammar rules and try again.";
            document.getElementById('result-msg').innerText = msg;
        }
    </script>
</body>
</html>
